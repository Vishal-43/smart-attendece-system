server {
  listen 80;
  server_name _;

  location / {
    proxy_pass http://web:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/v1/auth/ {
    proxy_pass http://auth-service:8081/api/v1/auth/;
  }

  location /api/v1/codes/ {
    proxy_pass http://qr-otp-service:8001/api/v1/codes/;
  }

  location /api/v1/attendance/ {
    proxy_pass http://attendance-service:8002/api/v1/attendance/;
  }

  location /api/v1/reports/ {
    proxy_pass http://backend:8000/api/v1/reports/;
  }

  location /api/v1/dashboard/ {
    proxy_pass http://backend:8000/api/v1/dashboard/;
  }

  location /api/v1/ {
    proxy_pass http://data-service:8003/api/v1/;
  }
}
