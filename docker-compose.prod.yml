version: '3.9'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: smartattendance_user
      POSTGRES_PASSWORD: smartattendance_pass
      POSTGRES_DB: smartattendance
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend-python
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://smartattendance_user:smartattendance_pass@db:5432/smartattendance
    depends_on:
      - db

  auth-service:
    build:
      context: ./java-microservices/auth-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHON_BACKEND_URL: http://backend:8000
      SERVER_PORT: 8081
    depends_on:
      - backend

  qr-otp-service:
    build:
      context: ./java-microservices/qr-otp-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHON_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  attendance-service:
    build:
      context: ./java-microservices/attendance-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHON_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  data-service:
    build:
      context: ./java-microservices/data-service
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PYTHON_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://nginx

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - auth-service
      - qr-otp-service
      - attendance-service
      - data-service
      - backend

volumes:
  postgres_data:
